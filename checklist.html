<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATEMdirector — Launch Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #0a0a0a; --white: #f5f3ef; --red: #e63030; --red-dark: #b52424;
    --green: #1db954; --amber: #f59e0b; --blue: #378add; --gray: #888;
    --gray-light: #2a2a2a; --mono: 'DM Mono', monospace; --sans: 'DM Sans', sans-serif; --display: 'Syne', sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--black); color: var(--white); font-family: var(--sans); font-weight: 300; line-height: 1.6; min-height: 100vh; padding: 0 0 6rem; }
  nav { position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 3rem; border-bottom: 1px solid rgba(255,255,255,0.06); background: rgba(10,10,10,0.9); backdrop-filter: blur(12px); }
  .logo { font-family: var(--display); font-weight: 800; font-size: 1.1rem; letter-spacing: -0.02em; color: var(--white); text-decoration: none; }
  .logo span { color: var(--red); }
  .nav-right { display: flex; align-items: center; gap: 1rem; }
  .progress-pill { font-family: var(--mono); font-size: 0.75rem; color: var(--gray); display: flex; align-items: center; gap: 0.75rem; }
  .progress-bar-outer { width: 120px; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
  .progress-bar-inner { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.4s ease; width: 0%; }
  .progress-count { color: var(--white); font-weight: 500; }
  .sync-status { font-family: var(--mono); font-size: 0.65rem; color: var(--gray); display: flex; align-items: center; gap: 0.4rem; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gray); flex-shrink: 0; transition: background 0.3s; }
  .sync-dot.syncing { background: var(--amber); animation: pulse 1s infinite; }
  .sync-dot.synced { background: var(--green); }
  .sync-dot.error { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .hero { padding: 5rem 3rem 3rem; border-bottom: 1px solid rgba(255,255,255,0.06); position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; top: -100px; right: -100px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(230,48,48,0.1) 0%, transparent 70%); pointer-events: none; }
  .hero-eyebrow { font-family: var(--mono); font-size: 0.7rem; color: var(--red); letter-spacing: 0.12em; text-transform: uppercase; display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.25rem; }
  .hero-eyebrow::before { content: ''; display: block; width: 28px; height: 1px; background: var(--red); }
  .hero-headline { font-family: var(--display); font-weight: 800; font-size: clamp(2.5rem, 5vw, 4rem); line-height: 1; letter-spacing: -0.03em; margin-bottom: 0.75rem; }
  .hero-headline em { font-style: normal; color: var(--red); }
  .hero-sub { font-family: var(--mono); font-size: 0.8rem; color: var(--gray); }
  .content { max-width: 860px; margin: 0 auto; padding: 3rem 3rem 0; }
  .phase { margin-bottom: 3rem; }
  .phase-header { display: flex; align-items: center; gap: 0.75rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 0.25rem; }
  .phase-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .phase-title { font-family: var(--mono); font-size: 0.7rem; color: var(--gray); letter-spacing: 0.1em; text-transform: uppercase; flex: 1; }
  .phase-count { font-family: var(--mono); font-size: 0.7rem; color: var(--gray); }
  .item { display: flex; align-items: flex-start; gap: 0.875rem; padding: 0.65rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); cursor: pointer; user-select: none; transition: background 0.1s; }
  .item:hover { background: rgba(255,255,255,0.02); margin: 0 -0.5rem; padding-left: 0.5rem; padding-right: 0.5rem; border-radius: 4px; }
  .item:last-child { border-bottom: none; }
  .checkbox { width: 16px; height: 16px; border-radius: 4px; border: 0.5px solid rgba(255,255,255,0.15); flex-shrink: 0; margin-top: 3px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; background: transparent; }
  .checkbox.checked { background: var(--green); border-color: var(--green); }
  .checkbox.checked::after { content: ''; display: block; width: 8px; height: 5px; border-left: 1.5px solid #0a0a0a; border-bottom: 1.5px solid #0a0a0a; transform: rotate(-45deg) translate(1px, -1px); }
  .item-body { flex: 1; }
  .item-label { font-size: 0.9rem; color: rgba(245,243,239,0.85); line-height: 1.5; transition: color 0.15s; }
  .item-label.checked { text-decoration: line-through; color: rgba(245,243,239,0.25); }
  .item-note { font-family: var(--mono); font-size: 0.7rem; color: var(--gray); margin-top: 2px; }
  .tag { display: inline-block; font-family: var(--mono); font-size: 0.6rem; padding: 0.15rem 0.5rem; border-radius: 3px; margin-left: 8px; vertical-align: middle; letter-spacing: 0.06em; text-transform: uppercase; }
  .tag-defer { background: rgba(136,136,136,0.12); color: var(--gray); }
  .tag-testing { background: rgba(245,158,11,0.12); color: var(--amber); }
  .reset-btn { font-family: var(--mono); font-size: 0.7rem; color: var(--gray); background: transparent; border: 0.5px solid rgba(255,255,255,0.1); padding: 0.4rem 1rem; border-radius: 4px; cursor: pointer; transition: color 0.2s, border-color 0.2s; letter-spacing: 0.06em; text-transform: uppercase; }
  .reset-btn:hover { color: var(--white); border-color: rgba(255,255,255,0.3); }
  @media (max-width: 640px) { nav { padding: 1rem 1.5rem; } .hero { padding: 4rem 1.5rem 2.5rem; } .content { padding: 2rem 1.5rem 0; } }
</style>
</head>
<body>

<nav>
  <a href="https://atemdirector.com" class="logo">ATEM<span>director</span></a>
  <div class="nav-right">
    <div class="sync-status">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">loading</span>
    </div>
    <div class="progress-pill">
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="progressBar"></div>
      </div>
      <span><span class="progress-count" id="progressCount">0</span> / <span id="progressTotal">0</span></span>
    </div>
    <button class="reset-btn" onclick="importState()">Import</button>
    <button class="reset-btn" onclick="exportState()">Export</button>
    <button class="reset-btn" onclick="resetAll()">Reset</button>
    <input type="file" id="importInput" accept=".json" style="display:none" onchange="handleImport(event)">
  </div>
</nav>

<div class="hero">
  <div class="hero-eyebrow">Launch Checklist</div>
  <h1 class="hero-headline">Ship <em>ATEMdirector.</em></h1>
  <p class="hero-sub">v0.9-beta</p>
</div>

<div class="content" id="checklist"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw6-LHgmcSuj9fSqClVjZOji2q0PHuSUIjHEThJeoNN8sjL95kvO2JqmtCWyO4miyqf4A/exec';
const STORAGE_KEY = 'atd_checklist_v2';

const phases = [
  {
    title: 'Phase 1 — Product', color: '#1D9E75',
    items: [
      { label: 'Custom icons for each button', done: true },
      { label: 'README / setup guide on GitHub' },
      { label: 'Include atem_audio_director.py inside plugin folder', note: 'Move from Desktop into plugin, update paths in plugin.js' },
      { label: 'Update plugin.js to use __dirname instead of ~/Desktop for Python script path' },
      { label: 'Create .command launcher that references plugin folder and drops shortcut on Desktop' },
      { label: 'Test Audio Director from new location' },
      { label: 'License key check for Pro features', done: true, tag: 'testing', note: 'Done in code — needs end-to-end testing' },
      { label: 'Split plugin into Free and Pro tiers', done: true, note: 'Done in code — needs Gumroad products live' },
      { label: 'Merge feature/custom-icons → main, tag v0.9-beta' },
      { label: 'Test on a clean Mac from scratch' },
      { label: 'Find beta tester with ATEM Mini (not Pro ISO)', note: 'Verify compatibility beyond Mini Pro ISO' },
    ]
  },
  {
    title: 'Phase 2 — Business & payments', color: '#378ADD',
    items: [
      { label: 'Register atemdirector.com', done: true },
      { label: 'Set up support email (support@atemdirector.com)', done: true },
      { label: 'Create Gumroad account', done: true },
      { label: 'Create Free and Pro products in Gumroad', note: 'Descriptions ready — paste and publish' },
      { label: 'Apply to Stream Deck Marketplace', note: 'After v0.9-beta is tagged and tested' },
      { label: 'Talk to contador about factura E', note: 'Exportación de servicios digitales → AFIP, invoicing Gumroad Inc.' },
      { label: 'Trademark "ATEMdirector"', tag: 'defer', note: 'Defer until revenue starts' },
    ]
  },
  {
    title: 'Phase 3 — Website', color: '#7F77DD',
    items: [
      { label: 'Landing page live on Cloudflare Pages', done: true },
      { label: 'Custom domain connected (atemdirector.com)', done: true },
      { label: 'Roadmap and compatibility sections added', done: true },
      { label: 'Website connected to GitHub for auto-deploy', done: true },
      { label: 'Link Gumroad buy buttons to landing page CTAs' },
      { label: 'Embed demo video on landing page' },
      { label: 'Set up Tally.so feedback form' },
      { label: 'Add feedback form to website' },
      { label: 'Add Google Analytics or Plausible' },
    ]
  },
  {
    title: 'Phase 4 — Demo video', color: '#D85A30',
    items: [
      { label: 'Write video script (2–3 min)', note: 'Hook → problem → demo → Audio Director spotlight → price' },
      { label: 'Record screen capture of plugin in action' },
      { label: 'Edit and upload to YouTube' },
      { label: 'Write YouTube description with SEO keywords' },
    ]
  },
  {
    title: 'Phase 5 — Marketing & launch', color: '#BA7517',
    items: [
      { label: 'Give free licenses to 5–10 ATEM YouTubers' },
      { label: 'Post in r/livevideotech and r/Twitch' },
      { label: 'Post in Blackmagic Design forum' },
      { label: 'Post in ATEM Facebook groups' },
      { label: 'Post on Twitter/X and LinkedIn' },
      { label: 'Run $100 Reddit or YouTube ad' },
      { label: 'Follow up with first 10 customers for testimonials' },
    ]
  }
];

let state = {};
let saveTimer = null;

function setSyncStatus(status, label) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot ' + status;
  lbl.textContent = label;
}

function loadFromSheet() {
  setSyncStatus('syncing', 'loading');
  return new Promise((resolve) => {
    const callbackName = 'gsCb_' + Date.now();
    const script = document.createElement('script');
    window[callbackName] = function(data) {
      delete window[callbackName];
      document.body.removeChild(script);
      try {
        if (data && typeof data === 'object') state = data;
      } catch(e) {}
      phases.forEach((phase, pi) => {
        phase.items.forEach((item, ii) => {
          const key = pi + '-' + ii;
          if (item.done && state[key] === undefined) state[key] = true;
        });
      });
      setSyncStatus('synced', 'synced');
      resolve();
    };
    script.onerror = function() {
      delete window[callbackName];
      document.body.removeChild(script);
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        Object.assign(state, saved);
      } catch(e) {}
      phases.forEach((phase, pi) => {
        phase.items.forEach((item, ii) => {
          const key = pi + '-' + ii;
          if (item.done && state[key] === undefined) state[key] = true;
        });
      });
      setSyncStatus('error', 'offline');
      resolve();
    };
    script.src = SCRIPT_URL + '?callback=' + callbackName;
    document.body.appendChild(script);
  });
}

function saveToSheet() {
  setSyncStatus('syncing', 'saving');
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  const callbackName = 'gsSave_' + Date.now();
  const script = document.createElement('script');
  window[callbackName] = function() {
    delete window[callbackName];
    document.body.removeChild(script);
    setSyncStatus('synced', 'synced');
  };
  script.onerror = function() {
    delete window[callbackName];
    document.body.removeChild(script);
    setSyncStatus('error', 'sync failed');
  };
  const encoded = encodeURIComponent(JSON.stringify(state));
  script.src = SCRIPT_URL + '?callback=' + callbackName + '&data=' + encoded;
  document.body.appendChild(script);
}

function scheduleSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToSheet, 800);
}

function toggle(pi, ii) {
  const key = pi + '-' + ii;
  state[key] = !state[key];
  renderItem(pi, ii);
  updatePhaseCount(pi);
  updateProgress();
  scheduleSave();
}

function exportState() {
  const data = { version: 1, state: state, exported: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'atemdirector-checklist.json'; a.click();
  URL.revokeObjectURL(url);
}

function importState() {
  document.getElementById('importInput').click();
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.state) { state = data.state; build(); saveToSheet(); }
      else alert('Invalid file.');
    } catch(err) { alert('Could not read file.'); }
    e.target.value = '';
  };
  reader.readAsText(file);
}

function resetAll() {
  if (!confirm('Reset all checkboxes?')) return;
  state = {};
  build();
  saveToSheet();
}

function totalItems() { return phases.reduce((a, p) => a + p.items.length, 0); }
function doneCount() { return Object.values(state).filter(Boolean).length; }

function updateProgress() {
  const total = totalItems();
  const done = doneCount();
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressCount').textContent = done;
  document.getElementById('progressTotal').textContent = total;
}

function updatePhaseCount(pi) {
  const phase = phases[pi];
  const done = phase.items.filter((_, ii) => state[pi + '-' + ii]).length;
  const el = document.getElementById('phase-count-' + pi);
  if (el) el.textContent = done + '/' + phase.items.length;
}

function renderItem(pi, ii) {
  const key = pi + '-' + ii;
  const isDone = !!state[key];
  const cb = document.getElementById('cb-' + key);
  const lb = document.getElementById('lb-' + key);
  if (cb) cb.className = 'checkbox' + (isDone ? ' checked' : '');
  if (lb) lb.className = 'item-label' + (isDone ? ' checked' : '');
}

function build() {
  const container = document.getElementById('checklist');
  container.innerHTML = '';
  phases.forEach((phase, pi) => {
    const doneCt = phase.items.filter((_, ii) => state[pi + '-' + ii]).length;
    const phaseEl = document.createElement('div');
    phaseEl.className = 'phase';
    phaseEl.innerHTML = `
      <div class="phase-header">
        <div class="phase-dot" style="background:${phase.color}"></div>
        <div class="phase-title">${phase.title}</div>
        <div class="phase-count" id="phase-count-${pi}">${doneCt}/${phase.items.length}</div>
      </div>
    `;
    phase.items.forEach((item, ii) => {
      const key = pi + '-' + ii;
      const isDone = !!state[key];
      let tagHtml = '';
      if (item.tag === 'defer') tagHtml = '<span class="tag tag-defer">defer</span>';
      if (item.tag === 'testing') tagHtml = '<span class="tag tag-testing">needs testing</span>';
      const itemEl = document.createElement('div');
      itemEl.className = 'item';
      itemEl.onclick = () => toggle(pi, ii);
      itemEl.innerHTML = `
        <div class="checkbox${isDone ? ' checked' : ''}" id="cb-${key}"></div>
        <div class="item-body">
          <div class="item-label${isDone ? ' checked' : ''}" id="lb-${key}">${item.label}${tagHtml}</div>
          ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
        </div>
      `;
      phaseEl.appendChild(itemEl);
    });
    container.appendChild(phaseEl);
  });
  updateProgress();
}

// Init
loadFromSheet().then(() => build());
</script>
</body>
</html>
